      function goNext() {
        setShowSolution(false);
        if (isLast) completeLevel(levelIndex, levelIndex === 9 ? 120 : 60);
        else setStage((s) => s + 1);
      }

      useEffect(() => {
        const handler = () => goNext();

        return () => window.removeEventListener("teacher-skip-task", handler);

        </section>
      );

        <div className={`mt-4 rounded-3xl border p-4 ${status === "right" ? "border-emerald-200 bg-emerald-50 text-emerald-950" : "border-amber-200 bg-amber-50 text-amber-950"}`}>
          <div className="flex items-start gap-2">
            {status === "right" ? <CheckCircle2 className="mt-0.5 h-5 w-5 shrink-0" /> : <Lightbulb className="mt-0.5 h-5 w-5 shrink-0" />}
            <div><p className="font-black">{status === "right" ? t("feedbackRight") : wrongText}</p>{(status === "right" || attempts >= 3) && <p className="mt-1 text-sm font-semibold opacity-85">{explanation}</p>}</div>
          </div>
        </div>
      );
    }

    function TaskShell({ t, children, question, solution, showSolution }) {
      return (
        <div className="rounded-[2rem] border border-slate-200 bg-white p-4 shadow-sm sm:p-6">
          <div className="mb-4 flex items-start gap-3"><div className="grid h-11 w-11 shrink-0 place-items-center rounded-2xl bg-cyan-100 text-cyan-800"><Brain className="h-6 w-6" /></div><div><p className="text-xs font-black uppercase tracking-[.22em] text-cyan-700">{t("task")}</p><h3 className="text-xl font-black text-slate-950 sm:text-2xl">{question}</h3></div></div>
          {children}
          {showSolution && <div className="mt-4 rounded-3xl border border-violet-200 bg-violet-50 p-4 text-sm font-bold text-violet-950"><span className="font-black">{t("solution")}:</span> {solution}</div>}
        </div>
      );
    }

    function TaskRenderer({ t, levelIndex, type, onSolved, showSolution }) {
      const data = t("tasks");
      const exp = t("explanations");
      if (levelIndex === 0 && type === "single") return <SingleChoice t={t} question={data.l1q1} answers={data.l1q1a} correct={1} explanation={exp.l1q1} onSolved={onSolved} showSolution={showSolution} />;
      if (levelIndex === 0 && type === "drag") return <DragMatch t={t} question={data.l1q2} cards={data.l1cards} zones={data.l1zones} correct={[0,1,2,3]} explanation={exp.l1q2} onSolved={onSolved} showSolution={showSolution} />;
      if (levelIndex === 1 && type === "multiple") return <MultipleChoice t={t} question={data.l2q1} answers={data.l2q1a} correct={[0,2,3]} explanation={exp.l2q1} onSolved={onSolved} showSolution={showSolution} />;
      if (levelIndex === 1 && type === "gap") return <GapTask t={t} question={data.l2q2} correct={["rechenzeichen", "gleichheitszeichen"]} explanation={exp.l2q2} onSolved={onSolved} showSolution={showSolution} />;
      if (levelIndex === 2 && type === "single") return <SingleChoice t={t} question={data.l3q1} answers={data.l3q1a} correct={1} explanation={exp.l3q1} onSolved={onSolved} showSolution={showSolution} />;
      if (levelIndex === 2 && type === "input") return <InputTask t={t} question={data.l3q2} valid={(v) => ["8+2.50·g", "8+2.5·g", "8+2.50g", "8+2.5g", "2.50·g+8", "2.5·g+8", "2.50g+8", "2.5g+8"].includes(normalize(v))} explanation={exp.l3q2} solution="8 + 2,50 · g" onSolved={onSolved} showSolution={showSolution} />;
      if (levelIndex === 3 && type === "drag") return <DragMatch t={t} question={data.l4q1} cards={data.l4cards} zones={data.l4zones} correct={[0,1,2,3]} explanation={exp.l4q1} onSolved={onSolved} showSolution={showSolution} />;
      if (levelIndex === 3 && type === "hotspot") return <HotspotTask t={t} question={data.l4q2} term={["7", "·", "x", "+", "3"]} correct={0} explanation={exp.l4q2} onSolved={onSolved} showSolution={showSolution} />;
      if (levelIndex === 4 && type === "input") return <InputTask t={t} question={data.l5q1} valid={(v) => normalize(v) === "19"} explanation={exp.l5q1} solution="19" onSolved={onSolved} showSolution={showSolution} />;
      if (levelIndex === 4 && type === "sort") return <SortTask t={t} question={data.l5q2} items={data.l5steps} correct={[0,1,2,3]} explanation={exp.l5q2} onSolved={onSolved} showSolution={showSolution} />;
      if (levelIndex === 5 && type === "single") return <SingleChoice t={t} question={data.l6q1} answers={data.l6q1a} correct={1} explanation={exp.l6q1} onSolved={onSolved} showSolution={showSolution} />;
      if (levelIndex === 5 && type === "multiple") return <MultipleChoice t={t} question={data.l6q2} answers={data.l6q2a} correct={[0,2,3]} explanation={exp.l6q2} onSolved={onSolved} showSolution={showSolution} />;
      if (levelIndex === 6 && type === "input") return <InputTask t={t} question={data.l7q1} valid={(v) => ["5x", "5·x"].includes(normalize(v))} explanation={exp.l7q1} solution="5x" onSolved={onSolved} showSolution={showSolution} />;
      if (levelIndex === 6 && type === "multiple") return <MultipleChoice t={t} question={data.l7q2} answers={data.l7q2a} correct={[0,2,4]} explanation={exp.l7q2} onSolved={onSolved} showSolution={showSolution} />;
      if (levelIndex === 7 && type === "single") return <SingleChoice t={t} question={data.l8q1} answers={data.l8q1a} correct={1} explanation={exp.l8q1} onSolved={onSolved} showSolution={showSolution} />;
      if (levelIndex === 7 && type === "hotspot") return <HotspotTask t={t} question={data.l8q2} term={["2 · (x + 4)", "=", "2x + 4", "=", "6x"]} correct={2} explanation={exp.l8q2} onSolved={onSolved} showSolution={showSolution} />;
      if (levelIndex === 8 && type === "single") return <SingleChoice t={t} question={data.l9q1} answers={data.l9q1a} correct={2} explanation={exp.l9q1} onSolved={onSolved} showSolution={showSolution} />;
      if (levelIndex === 8 && type === "input") return <InputTask t={t} question={data.l9q2} valid={(v) => /anzahl|tickets|stücke|fahrten|personen|gegenstände|karten/i.test(v)} explanation={exp.l9q2} solution="n steht für eine Anzahl, z. B. Anzahl der Tickets." onSolved={onSolved} showSolution={showSolution} long />;
      return null;
    }

    function SingleChoice({ t, question, answers, correct, explanation, onSolved, showSolution }) {
      const [selected, setSelected] = useState(null);
      const [status, setStatus] = useState(null);
      const [attempts, setAttempts] = useState(0);
      function submit() {
        const nextAttempts = attempts + 1;
        setAttempts(nextAttempts);
        if (selected === correct) { setStatus("right"); setTimeout(onSolved, 850); } else setStatus("wrong");
      }
      return <TaskShell t={t} question={question} solution={answers[correct]} showSolution={showSolution}><div className="grid gap-2 sm:grid-cols-2">{answers.map((a,i) => <button key={`${a}-${i}`} onClick={() => setSelected(i)} className={`tap rounded-2xl border p-4 text-left text-sm font-black transition ${selected === i ? "border-cyan-500 bg-cyan-50" : "border-slate-200 bg-slate-50 hover:bg-white"}`}>{a}</button>)}</div><button onClick={submit} disabled={selected === null} className="tap mt-4 rounded-2xl bg-slate-950 px-5 py-3 font-black text-white disabled:opacity-40">{t("check")}</button><Feedback t={t} status={status} attempts={attempts} explanation={explanation} /></TaskShell>;
    }

    function MultipleChoice({ t, question, answers, correct, explanation, onSolved, showSolution }) {
      const [selected, setSelected] = useState([]);
      const [status, setStatus] = useState(null);
      const [attempts, setAttempts] = useState(0);
      const toggle = (i) => setSelected((prev) => prev.includes(i) ? prev.filter((x) => x !== i) : [...prev, i]);
      function submit() {
        const nextAttempts = attempts + 1;
        setAttempts(nextAttempts);
        const ok = selected.length === correct.length && correct.every((i) => selected.includes(i));
        if (ok) { setStatus("right"); setTimeout(onSolved, 900); } else setStatus("wrong");
      }
      return <TaskShell t={t} question={question} solution={correct.map((i) => answers[i]).join(" | ")} showSolution={showSolution}><div className="grid gap-2">{answers.map((a,i) => <button key={`${a}-${i}`} onClick={() => toggle(i)} className={`tap flex items-center gap-3 rounded-2xl border p-4 text-left text-sm font-black transition ${selected.includes(i) ? "border-emerald-500 bg-emerald-50" : "border-slate-200 bg-slate-50 hover:bg-white"}`}><span className={`grid h-6 w-6 shrink-0 place-items-center rounded-lg border ${selected.includes(i) ? "border-emerald-600 bg-emerald-600 text-white" : "border-slate-300"}`}>{selected.includes(i) ? "✓" : ""}</span>{a}</button>)}</div><button onClick={submit} className="tap mt-4 rounded-2xl bg-slate-950 px-5 py-3 font-black text-white">{t("check")}</button><Feedback t={t} status={status} attempts={attempts} explanation={explanation} /></TaskShell>;
    }

    function InputTask({ t, question, valid, explanation, solution, onSolved, showSolution, long }) {
      const [value, setValue] = useState("");
      const [status, setStatus] = useState(null);
      const [attempts, setAttempts] = useState(0);
      function submit() {
        const nextAttempts = attempts + 1;
        setAttempts(nextAttempts);
        if (valid(value)) { setStatus("right"); setTimeout(onSolved, 900); } else setStatus("wrong");
      }
      return <TaskShell t={t} question={question} solution={solution} showSolution={showSolution}>{long ? <textarea value={value} onChange={(e) => setValue(e.target.value)} placeholder={t("inputPlaceholder")} className="min-h-[130px] w-full rounded-3xl border border-slate-200 bg-slate-50 p-4 text-base font-semibold outline-none focus:border-cyan-400" /> : <input value={value} onChange={(e) => setValue(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") submit(); }} placeholder={t("inputPlaceholder")} className="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4 text-lg font-black outline-none focus:border-cyan-400" />}<button onClick={submit} className="tap mt-4 rounded-2xl bg-slate-950 px-5 py-3 font-black text-white">{t("check")}</button><Feedback t={t} status={status} attempts={attempts} explanation={explanation} /></TaskShell>;
    }

    function GapTask({ t, question, correct, explanation, onSolved, showSolution }) {
      const [values, setValues] = useState(["", ""]);
      const [status, setStatus] = useState(null);
      const [attempts, setAttempts] = useState(0);
      function submit() {
        const nextAttempts = attempts + 1;
        setAttempts(nextAttempts);
        const ok = values.every((v,i) => normalize(v) === correct[i]);
        if (ok) { setStatus("right"); setTimeout(onSolved, 900); } else setStatus("wrong");
      }
      return <TaskShell t={t} question={question} solution="Rechenzeichen; Gleichheitszeichen" showSolution={showSolution}><div className="grid gap-3 sm:grid-cols-2">{values.map((v,i) => <input key={i} value={v} onChange={(e) => setValues(values.map((x,idx) => idx === i ? e.target.value : x))} placeholder={`${t("gapPlaceholder")} ${i + 1}`} className="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4 text-lg font-black outline-none focus:border-cyan-400" />)}</div><button onClick={submit} className="tap mt-4 rounded-2xl bg-slate-950 px-5 py-3 font-black text-white">{t("check")}</button><Feedback t={t} status={status} attempts={attempts} explanation={explanation} /></TaskShell>;
    }

    function DragMatch({ t, question, cards, zones, correct, explanation, onSolved, showSolution }) {
      const [placements, setPlacements] = useState({});
      const [dragging, setDragging] = useState(null);
      const [status, setStatus] = useState(null);
      const [attempts, setAttempts] = useState(0);
      const place = (cardIndex, zoneIndex) => setPlacements((p) => ({ ...p, [cardIndex]: zoneIndex }));
      function submit() {
        const nextAttempts = attempts + 1;
        setAttempts(nextAttempts);
        const ok = cards.every((_, i) => placements[i] === correct[i]);
        if (ok) { setStatus("right"); setTimeout(onSolved, 1000); } else setStatus("wrong");
      }
      return <TaskShell t={t} question={question} solution={cards.map((c,i) => `${c} → ${zones[correct[i]]}`).join(" | ")} showSolution={showSolution}><p className="mb-3 text-sm font-bold text-slate-600">{t("dragInstruction")}</p><div className="mb-4 flex flex-wrap gap-2">{cards.map((c,i) => <button key={`${c}-${i}`} draggable onDragStart={() => setDragging(i)} onClick={() => setDragging(i)} className={`tap rounded-2xl border bg-white px-4 py-3 text-lg font-black shadow-sm ${dragging === i ? "border-cyan-500 ring-4 ring-cyan-100" : "border-slate-200"}`}>{c}</button>)}</div><div className="grid gap-3 sm:grid-cols-2">{zones.map((z,zi) => <div key={z} onDragOver={(e) => e.preventDefault()} onDrop={() => dragging !== null && place(dragging, zi)} onClick={() => dragging !== null && place(dragging, zi)} className="min-h-[105px] rounded-3xl border-2 border-dashed border-cyan-200 bg-cyan-50/70 p-3"><p className="mb-2 text-sm font-black text-cyan-950">{z}</p><div className="flex flex-wrap gap-2">{cards.map((c,ci) => placements[ci] === zi ? <span key={`${c}-placed`} className="rounded-2xl bg-slate-950 px-3 py-2 text-base font-black text-white">{c}</span> : null)}</div></div>)}</div><div className="mt-4 flex gap-2"><button onClick={submit} className="tap rounded-2xl bg-slate-950 px-5 py-3 font-black text-white">{t("check")}</button><button onClick={() => { setPlacements({}); setDragging(null); setStatus(null); }} className="tap rounded-2xl border border-slate-200 bg-white px-5 py-3 font-black text-slate-700">{t("reset")}</button></div><Feedback t={t} status={status} attempts={attempts} explanation={explanation} /></TaskShell>;
    }

    function HotspotTask({ t, question, term, correct, explanation, onSolved, showSolution }) {
      const [selected, setSelected] = useState(null);
      const [status, setStatus] = useState(null);
      const [attempts, setAttempts] = useState(0);
      function submit(i) {
        setSelected(i);
        const nextAttempts = attempts + 1;
        setAttempts(nextAttempts);
        if (i === correct) { setStatus("right"); setTimeout(onSolved, 850); } else setStatus("wrong");
      }
      return <TaskShell t={t} question={question} solution={term[correct]} showSolution={showSolution}><p className="mb-3 text-sm font-bold text-slate-600">{t("hotspotInstruction")}</p><div className="flex flex-wrap items-center gap-2 rounded-3xl bg-slate-50 p-4">{term.map((part,i) => <button key={`${part}-${i}`} onClick={() => submit(i)} className={`tap rounded-2xl border px-4 py-4 text-xl font-black transition sm:text-3xl ${selected === i ? "border-cyan-500 bg-cyan-100" : "border-slate-200 bg-white hover:bg-cyan-50"}`}>{part}</button>)}</div><Feedback t={t} status={status} attempts={attempts} explanation={explanation} /></TaskShell>;
    }

    function SortTask({ t, question, items, correct, explanation, onSolved, showSolution }) {
      const [order, setOrder] = useState([2,0,3,1]);
      const [status, setStatus] = useState(null);
      const [attempts, setAttempts] = useState(0);
      function move(pos, dir) {
        const next = [...order];
        const newPos = pos + dir;
        if (newPos < 0 || newPos >= next.length) return;
        [next[pos], next[newPos]] = [next[newPos], next[pos]];
        setOrder(next);
      }
      function submit() {
        const nextAttempts = attempts + 1;
        setAttempts(nextAttempts);
        const ok = order.every((x,i) => x === correct[i]);
        if (ok) { setStatus("right"); setTimeout(onSolved, 1000); } else setStatus("wrong");
      }
      return <TaskShell t={t} question={question} solution={correct.map((i) => items[i]).join(" → ")} showSolution={showSolution}><p className="mb-3 text-sm font-bold text-slate-600">{t("sortInstruction")}</p><div className="space-y-2">{order.map((itemIndex,pos) => <div key={itemIndex} className="flex items-center gap-2 rounded-2xl border border-slate-200 bg-slate-50 p-3"><div className="grid h-9 w-9 place-items-center rounded-xl bg-slate-950 text-sm font-black text-white">{pos + 1}</div><p className="flex-1 text-sm font-black text-slate-800">{items[itemIndex]}</p><button onClick={() => move(pos, -1)} className="tap rounded-xl bg-white p-2 shadow-sm"><ChevronUp className="h-4 w-4" /></button><button onClick={() => move(pos, 1)} className="tap rounded-xl bg-white p-2 shadow-sm"><ChevronDown className="h-4 w-4" /></button></div>)}</div><button onClick={submit} className="tap mt-4 rounded-2xl bg-slate-950 px-5 py-3 font-black text-white">{t("check")}</button><Feedback t={t} status={status} attempts={attempts} explanation={explanation} /></TaskShell>;
    }

    function BossLevel({ t, onDone }) {
      const questions = useMemo(() => t("bossQuestions"), [t]);
      const [started, setStarted] = useState(false);
      const [time, setTime] = useState(60);
      const [index, setIndex] = useState(0);
      const [input, setInput] = useState("");
      const [score, setScore] = useState(0);
      const [wrong, setWrong] = useState(0);
      const [finished, setFinished] = useState(false);

      useEffect(() => {
        if (!started || finished) return undefined;
        if (time <= 0) {
          setFinished(true);
          return undefined;
        }
        const id = window.setTimeout(() => setTime((v) => v - 1), 1000);
        return () => window.clearTimeout(id);
      }, [started, time, finished]);

      function submit() {
        if (!input.trim()) return;
        const q = questions[index % questions.length];
        const acceptedAnswers = Array.isArray(q.a) ? q.a : [q.a];
        const ok = acceptedAnswers.some((answer) => normalize(input) === normalize(answer));
        if (ok) setScore((s) => s + 1);
        else setWrong((w) => w + 1);
        setInput("");
        setIndex((i) => i + 1);
      }

      if (!started) return <div className="rounded-[2rem] bg-slate-950 p-5 text-white sm:p-8"><div className="mb-4 flex items-center gap-3"><Rocket className="h-10 w-10 text-cyan-300" /><div><p className="text-xs font-black uppercase tracking-[.25em] text-cyan-300">{t("level")} 10</p><h3 className="text-3xl font-black">{t("bossTitle")}</h3></div></div><p className="max-w-2xl text-lg leading-relaxed text-slate-100">{t("bossIntro")}</p><button onClick={() => setStarted(true)} className="tap mt-6 rounded-2xl bg-cyan-300 px-5 py-3 font-black text-slate-950">{t("bossStart")}</button></div>;
      if (finished) return <div className="rounded-[2rem] border border-emerald-200 bg-emerald-50 p-5 sm:p-8"><PartyPopper className="mb-3 h-12 w-12 text-emerald-700" /><h3 className="text-3xl font-black text-slate-950">{t("finished")}</h3><p className="mt-2 text-lg font-bold text-slate-700">{score} {t("correct")}, {wrong} {t("wrong")}</p><button onClick={() => onDone(score)} className="tap mt-6 rounded-2xl bg-slate-950 px-5 py-3 font-black text-white">{t("showCertificate")}</button></div>;
      const q = questions[index % questions.length];
      const charge = Math.min(100, Math.round((score / 10) * 100));
      return <div className="rounded-[2rem] border border-slate-200 bg-white p-5 sm:p-8"><div className="mb-4 grid gap-3 sm:grid-cols-3"><div className="rounded-2xl bg-slate-950 p-4 text-white"><Timer className="mb-1 h-5 w-5 text-cyan-300" /><p className="text-xs font-black uppercase tracking-[.2em] text-cyan-100">{t("timeLeft")}</p><p className="text-3xl font-black">{time}</p></div><div className="rounded-2xl bg-emerald-50 p-4 text-emerald-950"><CheckCircle2 className="mb-1 h-5 w-5" /><p className="text-xs font-black uppercase tracking-[.2em]">{t("correct")}</p><p className="text-3xl font-black">{score}</p></div><div className="rounded-2xl bg-cyan-50 p-4 text-cyan-950"><Rocket className="mb-1 h-5 w-5" /><p className="text-xs font-black uppercase tracking-[.2em]">{t("rocketCharge")}</p><p className="text-3xl font-black">{charge}%</p></div></div><div className="rounded-3xl bg-slate-50 p-5"><h3 className="text-xl font-black text-slate-950">{q.q}</h3><input autoFocus value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") submit(); }} placeholder={t("inputPlaceholder")} className="mt-4 w-full rounded-2xl border border-slate-200 bg-white px-4 py-4 text-lg font-black outline-none focus:border-cyan-400" /><button onClick={submit} className="tap mt-3 rounded-2xl bg-slate-950 px-5 py-3 font-black text-white">{t("check")}</button></div></div>;
    }

    function Certificate({ t, name, avatar, color, xp, resetApp }) {
      const today = new Date().toLocaleDateString("de-DE");
      return (
        <section className="mx-auto max-w-4xl rounded-[2.5rem] border border-white/70 bg-white p-6 text-center shadow-2xl sm:p-10">
          <div className="mx-auto mb-5 grid h-24 w-24 place-items-center rounded-[2rem] bg-slate-950 text-white shadow-xl"><Trophy className="h-14 w-14 text-amber-300" /></div>
          <p className="text-xs font-black uppercase tracking-[.35em] text-cyan-700">{t("certificate")}</p>
          <h2 className="mt-2 text-4xl font-black tracking-tight text-slate-950 sm:text-6xl">{name}</h2>
          <div className={`mx-auto my-6 grid h-20 w-20 place-items-center rounded-[2rem] bg-gradient-to-br ${color} text-4xl shadow-xl`}>{avatar}</div>
          <p className="mx-auto max-w-2xl text-xl font-bold leading-relaxed text-slate-700">{t("certificateText")}</p>
          <div className="mt-8 grid gap-3 sm:grid-cols-2"><div className="rounded-3xl bg-slate-50 p-5"><p className="text-xs font-black uppercase tracking-[.2em] text-slate-500">{t("date")}</p><p className="text-2xl font-black text-slate-950">{today}</p></div><div className="rounded-3xl bg-slate-50 p-5"><p className="text-xs font-black uppercase tracking-[.2em] text-slate-500">{t("finalXp")}</p><p className="text-2xl font-black text-slate-950">{xp} XP</p></div></div>
          <button onClick={resetApp} className="tap mt-8 rounded-2xl bg-slate-950 px-5 py-3 font-black text-white"><RotateCcw className="mr-2 inline h-5 w-5" />{t("restart")}</button>
        </section>
      );
    }

    function TeacherModal({ t, setTeacherOpen, teacherPw, setTeacherPw, teacherUnlocked, openTeacherPanel, teacherMsg, unlockAll, revealSolution, skipTask }) {
      return (
        <div className="fixed inset-0 z-50 grid place-items-center bg-slate-950/70 p-3 backdrop-blur-sm">
          <div className="w-full max-w-lg rounded-[2rem] bg-white p-5 shadow-2xl sm:p-7">
            <div className="mb-4 flex items-center justify-between"><div><p className="text-xs font-black uppercase tracking-[.25em] text-cyan-700">{t("teacherHint")}</p><h2 className="text-2xl font-black text-slate-950">{t("teacher")}</h2></div><button onClick={() => setTeacherOpen(false)} className="tap rounded-2xl bg-slate-100 p-2"><XCircle className="h-6 w-6" /></button></div>
            {!teacherUnlocked ? <div><label className="text-sm font-black text-slate-700">{t("password")}</label><div className="mt-2 flex gap-2"><input type="password" value={teacherPw} onChange={(e) => setTeacherPw(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") openTeacherPanel(); }} className="min-w-0 flex-1 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 font-bold outline-none focus:border-cyan-400" /><button onClick={openTeacherPanel} className="tap rounded-2xl bg-slate-950 px-4 py-3 font-black text-white"><KeyRound className="h-5 w-5" /></button></div>{teacherMsg && <p className="mt-3 text-sm font-bold text-amber-700">{teacherMsg}</p>}</div> : <div className="grid gap-2"><button onClick={unlockAll} className="tap rounded-2xl bg-cyan-600 px-4 py-3 text-left font-black text-white"><Unlock className="mr-2 inline h-5 w-5" />{t("unlockAll")}</button><button onClick={revealSolution} className="tap rounded-2xl bg-violet-600 px-4 py-3 text-left font-black text-white"><Eye className="mr-2 inline h-5 w-5" />{t("revealSolution")}</button><button onClick={skipTask} className="tap rounded-2xl bg-slate-950 px-4 py-3 text-left font-black text-white"><ChevronRight className="mr-2 inline h-5 w-5" />{t("skipTask")}</button></div>}
          </div>
        </div>
      );
    }


    createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
